name: Bare JSON Type Check

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  bare-json-check:
    name: Check for bare dict types
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run bare JSON audit
      run: |
        python scripts/audit_bare_json.py . --format json --output audit_report.json

    - name: Upload audit report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: bare-json-audit-report
        path: audit_report.json

    - name: Comment PR with results
      if: github.event_name == 'pull_request' && failure()
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const report = JSON.parse(fs.readFileSync('audit_report.json', 'utf8'));

          let body = '## ⚠️ Bare JSON Type Check Failed\n\n';
          body += `Found **${report.summary.total_violations}** violations in **${report.summary.files_with_violations}** files.\n\n`;

          if (report.violations.length > 0) {
            body += '### Top Violations\n\n';
            report.violations.slice(0, 10).forEach(v => {
              body += `- **${v.file}:${v.line}** - ${v.pattern}\n`;
              body += `  \`${v.content.substring(0, 60)}\`\n`;
            });

            if (report.violations.length > 10) {
              body += `\n... and ${report.violations.length - 10} more\n`;
            }
          }

          body += '\nPlease use Pydantic models instead of bare `dict` or `Dict[str, Any]` types.\n';
          body += 'See [migration guide](docs/BARE_JSON_MIGRATION.md) for details.\n';

          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: body
          });
