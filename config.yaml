# 应用配置（非敏感信息在本文档，敏感信息从 .env 读取）

# 基础配置
app:
  name: "Learn Claude Code API"
  version: "1.0.0"
  debug: true
  environment: development

# 服务器配置
server:
  host: "0.0.0.0"
  port: 8001

# CORS 配置
cors:
  origins:
    - "http://localhost:3000"
    - "http://localhost:3001"
    - "http://127.0.0.1:3000"
  credentials: true
  methods:
    - "GET"
    - "POST"
    - "PUT"
    - "DELETE"
    - "OPTIONS"
  headers:
    - "*"

# 日志配置
logging:
  level: ${LOG_LEVEL:-INFO}
  json: ${LOG_JSON:-false}
  file: ${LOG_FILE:-logs/app.log}
  rotation: ${LOG_ROTATION:-10 MB}
  retention: ${LOG_RETENTION:-7 days}
  deep_dir: ${DEEP_LOG_DIR:-logs/deep}
  deep_rotation: ${DEEP_LOG_ROTATION:-100 MB}
  deep_retention: ${DEEP_LOG_RETENTION:-3 days}

# 数据目录
data:
  dir: "../web/src/data"

# 限流配置
rate_limit:
  enabled: true
  requests: 100

# 缓存配置
cache:
  enabled: true
  ttl: 300

# Agent 配置
agent:
  type: ${AGENT_TYPE:-deep}
  max_rounds: ${MAX_AGENT_ROUNDS:-null}
  recursion_limit: ${AGENT_RECURSION_LIMIT:-100}

# 模型配置
model:
  id: ${MODEL_ID:-deepseek/deepseek-reasoner}
  default: ${MODEL_ID:-deepseek/deepseek-reasoner}

# TODO 配置
todo:
  max_items: ${TODO_MAX_ITEMS:-20}
  reminder_rounds: ${TODO_REMINDER_ROUNDS:-3}
  enable_hook: ${ENABLE_TODO_HOOK:-1}

# Skill Edit 配置
skill_edit:
  enable_hitl: ${ENABLE_SKILL_EDIT_HITL:-1}

# 数据库配置（敏感信息从 .env 读取）
database:
  driver: postgresql+asyncpg
  host: ${POSTGRES_HOST:-localhost}
  port: ${POSTGRES_PORT:-5432}
  name: ${POSTGRES_DB:-agent_memory}
  user: ${POSTGRES_USER:-postgres}
  password: ${POSTGRES_PASSWORD:-123456}
  pool_size: 10
  max_overflow: 20

# JWT 配置（敏感信息从 .env 读取）
jwt:
  secret_key: ${JWT_SECRET_KEY:-default-secret-key}
  algorithm: HS256
  expire_minutes: 1440

# API 密钥配置（敏感信息从 .env 读取）
api_keys:
  deepseek: ${DEEPSEEK_API_KEY:-}
  deepseek_base_url: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com/v1}
  anthropic: ${ANTHROPIC_API_KEY:-}
  anthropic_base_url: ${ANTHROPIC_BASE_URL:-}
  openai: ${OPENAI_API_KEY:-}
  openai_base_url: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
  moonshot: ${MOONSHOT_API_KEY:-}
  moonshot_base_url: ${MOONSHOT_BASE_URL:-https://api.moonshot.cn/v1}
  kimi: ${KIMI_API_KEY:-}

# Agent 安全策略
security:
  blacklist_commands:
    - "rm -rf /"
    - "rm -rf /*"
    - "dd if=/dev/zero"
    - "mkfs."
    - ":(){ :|:& };:"
    - "> /dev/sda"
  blacklist_paths:
    - "/etc/passwd"
    - "/etc/shadow"
    - "/root/.ssh"
    - "~/.ssh/id_rsa"
    - "~/.ssh/id_ed25519"
  whitelist_commands:
    - "ls"
    - "cat"
    - "grep"
    - "find"
    - "head"
    - "tail"
    - "python"
    - "python3"
    - "pip"
    - "uv"
    - "git"
    - "git clone"
    - "git pull"
    - "git commit"
    - "npm"
    - "pnpm"
    - "yarn"
    - "docker ps"
    - "docker logs"
    - "docker exec"

# Agent Sandbox 模式
sandbox:
  mode: ${AGENT_SANDBOX:-docker}

# Bash 脚本白名单
bash:
  script_whitelist: ${BASH_SCRIPT_WHITELIST:-}
